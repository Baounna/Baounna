      <stop offset="0" stop-color="#0b0f16"/>
      <stop offset="1" stop-color="#0a0d13"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#1f6feb"/>
      <stop offset="1" stop-color="#7ee787" stop-opacity="0.2"/>
    </linearGradient>
  </defs>

  <!-- window -->
  <rect x="12" y="12" width="876" height="576" rx="16" fill="url(#bg)" stroke="#1f6feb" stroke-opacity="0.55" filter="url(#glow)"/>
  <rect x="12" y="12" width="876" height="576" rx="16" fill="none" stroke="#30363d" stroke-opacity="0.6"/>

